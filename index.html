<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grabit</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 2px;
      margin: 0;
    }

    p {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      h1 {
        font-size: 42px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Grabit</h1>
    <p>before it's gone</p>
  </div>
</body>
</html>
